# 应用配置
spring:
  application:
    name: restaurant-order-system
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://localhost:3306/restaurant_order_system?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.example.demo.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0


# JWT配置
jwt:
  secret: restaurant-order-system-secret-key-2024
  expiration: 86400000

# 跨域配置
cors:
  allowed-origins:
    - http://localhost:5173
    - http://localhost:3000
server:
  port: 8082  # 修改为8082端口，避免冲突